        <script>

// import {TRANSITIONS, VALID_TRANSITIONS, HEX_TRANSITIONS, VALID_HEX_TRANSITIONS, parseTransitions, unparseTransitions, getApgcode, ALTERNATE_SYMMETRIES, identify, parse} from './lib/index.js';


let patterns = [];

let selectedPatterns = new Set();

let rleTextarea = document.getElementById('rle');
let addButton = document.getElementById('add');
let minmaxElt = document.getElementById('minmax');
let maxGensInput = document.getElementById('max-gens');
let patternsDiv = document.getElementById('patterns');

function create(type, className, text) {
    let elt = document.createElement(type);
    if (className) {
        elt.className = className;
    }
    if (text) {
        elt.textContent = text;
    }
    return elt;
}

function getMAPRuleTrs(rule, validTrs) {
    if (rule.endsWith('H')) {
        rule = rule.slice(0, -1);
    }
    let parts = rule.split('/');
    if (parts.length === 2) {
        return [parseTransitions(parts[0].slice(1), validTrs), parseTransitions(parts[1].slice(1), validTrs)];
    } else {
        return [parseTransitions(parts[1], validTrs), parseTransitions(parts[0], validTrs)];
    }
}

function computeCombinedMinmax() {
    if (selectedPatterns.size === 0) {
        minmaxElt.textContent = 'No patterns selected.';
        return;
    }
    let patterns = Array.from(selectedPatterns);
    let p = patterns[0].p;
    for (let type of patterns.slice(1)) {
        if (type.p.constructor !== p.constructor) {
            minmaxElt.textContent = 'Patterns of different rulespaces are selected.';
            return;
        }
    }
    if (p instanceof MAPPattern || p instanceof MAPB0Pattern || p instanceof MAPGenPattern || p instanceof MAPGenB0Pattern) {
        let isHex = p.ruleStr.endsWith('H');
        let allTrs;
        let validTrs;
        if (isHex && patterns.every(type => isHex === type.p.ruleStr.endsWith('H'))) {
            allTrs = Object.keys(HEX_TRANSITIONS);
            validTrs = VALID_HEX_TRANSITIONS;
        } else {
            isHex = false;
            allTrs = Object.keys(TRANSITIONS);
            validTrs = VALID_TRANSITIONS;
        }
        let minB = new Set();
        let minS = new Set();
        let maxB = new Set(allTrs);
        let maxS = new Set(allTrs);
        if ('evenTrs' in p) {
            minB.add('0c');
            maxS.delete('8c');
        } else {
            maxB.delete('0c');
        }
        for (let type of patterns) {
            let [newMinB, newMinS] = getMAPRuleTrs(type.minmax[0], validTrs);
            let [newMaxB, newMaxS] = getMAPRuleTrs(type.minmax[1], validTrs);
            for (let tr of newMinB) {
                if (!maxB.has(tr)) {
                    minmaxElt.textContent = 'Patterns are incompatible.';
                    return;
                }
                minB.add(tr);
            }
            for (let tr of newMinS) {
                if (!maxS.has(tr)) {
                    minmaxElt.textContent = 'Patterns are incompatible.';
                    return;
                }
                minS.add(tr);
            }
            for (let tr of maxB) {
                if (!newMaxB.includes(tr)) {
                    maxB.delete(tr);
                }
            }
            for (let tr of maxS) {
                if (!newMaxS.includes(tr)) {
                    maxS.delete(tr);
                }
            }
        }
        minB = unparseTransitions(minB, validTrs, isHex);
        minS = unparseTransitions(minS, validTrs, isHex);
        maxB = unparseTransitions(maxB, validTrs, isHex);
        maxS = unparseTransitions(maxS, validTrs, isHex);
        let min;
        let max;
        if (p instanceof MAPGenPattern || p instanceof MAPGenB0Pattern) {
            min = `${minS}/${minB}/${p.states}`;
            max = `${maxS}/${maxB}/${p.states}`;
        } else {
            min = `B${minB}/S${minS}`;
            max = `B${maxB}/S${maxS}`;
        }
        if (isHex) {
            min += 'H';
            max += 'H';
        }
        minmaxElt.textContent = `Min: ${min}\nMax: ${max}`;
        return;
    } else {
        minmaxElt.textContent = 'Unsupported rulespace for minmax.';
        return;
    }
}

function createPatternElt(type, output = false) {
    if (!type.apgcode) {
        type.apgcode = getApgcode(type);
    }
    let elt = create('div', 'pattern');
    let top = create('div', 'pattern-top');
    let topLeft = create('div', 'pattern-top-left');
    if (type.minmax) {
        let checkbox = create('input', 'pattern-checkbox');
        checkbox.type = 'checkbox';
        checkbox.addEventListener('change', () => {
            if (checkbox.checked) {
                selectedPatterns.add(type);
            } else {
                selectedPatterns.delete(type);
            }
            computeCombinedMinmax();
        });
        topLeft.appendChild(checkbox);
    }
    let name = type.name ? `${type.name} (${type.desc})` : type.desc;
    if (output) {
        name = 'Output: ' + name;
    }
    topLeft.appendChild(create('div', 'pattern-name', name));
    top.appendChild(topLeft);
    let arrow = create('div', 'pattern-arrow closed');
    top.appendChild(arrow);
    elt.appendChild(top);
    let basicText = type.minmax ? `Min: ${type.minmax[0]}\nMax: ${type.minmax[1]}\n` : '';
    let text = basicText;
    if (type.power !== undefined) {
        text += `Power: ${type.power}\n`;
    }
    text += `Symmetry: ${type.symmetry} (${ALTERNATE_SYMMETRIES[type.symmetry]})\n`;
    if (type.heat !== undefined) {
        text += `Heat: ${type.heat.toFixed(3).replace(/(\.?)0+$/, '')}\n`;
    }
    if (type.temperature !== undefined) {
        text += `Temperature: ${type.temperature.toFixed(3).replace(/(\.?)0+$/, '')}\n`;
    }
    if (type.volatility !== undefined) {
        text += `Volatility: ${type.volatility.toFixed(3).replace(/(\.?)0+$/, '')}\n`;
    }
    if (type.strictVolatility !== undefined) {
        text += `Strict volatility: ${type.strictVolatility.toFixed(3).replace(/(\.?)0+$/, '')}\n`;
    }
    text = text.slice(0, -1);
    let textElt = create('div', undefined, basicText);
    let textWrapperElt = create('div', 'pattern-text');
    textWrapperElt.appendChild(textElt);
    let apgcodeText = type.apgcode;
    let apgcodeElt = create('a', 'pattern-apgcode', type.apgcode.length > 50 ? `${type.apgcode.slice(0, 24)}...${type.apgcode.slice(-24)}` : type.apgcode);
    apgcodeElt.href = `https://catagolue.hatsya.com/object/${type.apgcode}/${toCatagolueRule(type.p.ruleStr)}`;
    apgcodeElt.style.display = 'none';
    textWrapperElt.appendChild(apgcodeElt);
    elt.appendChild(textWrapperElt);
    let outputElt = undefined;
    if (type.output) {
        outputElt = createPatternElt(type.output, true);
        outputElt.style.display = 'none';
        elt.appendChild(outputElt);
    }
    let open = false;
    arrow.addEventListener('click', () => {
        open = !open;
        if (open) {
            arrow.className = 'pattern-arrow open';
            textElt.textContent = text;
            apgcodeElt.style.display = 'block';
            if (outputElt) {
                outputElt.style.display = 'block';
            }
        } else {
            arrow.className = 'pattern-arrow closed';
            textElt.textContent = basicText;
            apgcodeElt.style.display = 'none';
            if (outputElt) {
                outputElt.style.display = 'none';
            }
        }
    });
    return elt;
}

function savePatterns(x, ps) {
    if (x.p) {
        ps.push([x, x.p]);
        delete x.p;
    }
    if (x.output) {
        savePatterns(x.output, ps);
    }
}

function restorePatterns(x) {
    if (!x.p) {
        x.p = parse(x.rle);
    }
    if (x.output) {
        restorePatterns(x.output);
    }
}

function addPattern(type, save = true) {
    patterns.push(type);
    if (save) {
        let ps = [];
        for (let type of patterns) {
            savePatterns(type, ps);
        }
        localStorage.identifyPatterns = JSON.stringify(patterns);
        for (let [x, p] of ps) {
            x.p = p;
        }
    }
    restorePatterns(type);
    let elt = createPatternElt(type);
    if (patternsDiv.children.length === 0) {
        patternsDiv.appendChild(elt);
    } else {
        patternsDiv.insertBefore(elt, patternsDiv.children[0]);
    }
}


if (localStorage.identifyPatterns) {
    for (let type of JSON.parse(localStorage.identifyPatterns)) {
        addPattern(type, false);
    }
}

if (localStorage.identifyMaxGens) {
    maxGensInput.value = localStorage.identifyMaxGens;
}

maxGensInput.addEventListener('change', () => {
    localStorage.identifyMaxGens = maxGensInput.value;
});

if (localStorage.identifyRLE) {
    rleTextarea.value = localStorage.identifyRLE;
}

rleTextarea.addEventListener('change', () => {
    localStorage.identifyRLE = rleTextarea.value;
});

function normalizeType(type) {
    type.apgcode = getApgcode(type);
    if (type.disp && (type.disp[0] !== 0 || type.disp[1] !== 0)) {
        type.desc = `${speedToString({dx: type.disp[0], dy: type.disp[1], period: type.period})} ${type.linear ? 'puffer' : 'spaceship'}`;
        if (type.stabilizedAt > 0) {
            type.desc = 'Stabilizes into ' + type.desc;
        }
    }
    type.p = type.phases[type.stabilizedAt];
    type.rle = type.p.toRLE();
    delete type.phases;
    delete type.hashes;
    if (type.output) {
        type.output = normalizeType(type.output);
    }
    return type;
}

addButton.addEventListener('click', () => {
    let type = identify(parse(rleTextarea.value), maxGensInput.value);
    type = normalizeType(type);
    addPattern(type);
});

        </script>
