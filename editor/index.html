<!DOCTYPE html>
<html>
    <head>
        <title>lifeweb</title>
        <meta charset="utf-8">
        <style>

* {
    box-sizing: border-box;
}

html, body {
    position: absolute;
    inset: 0;
    height: 100%;
    width: 100%;
    padding: 0;
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    display: flex;
    flex-direction: row;
    background-color: #000000;
    color: #ffffff;
}

#left {
    flex: 1 0 20%;
    display: flex;
    flex-direction: column;
    border-right: 1px solid #ffffff;
}

#left button, input:not([type=checkbox]) {
    padding: 3px 6px;
    font-family: inherit;
    font-size: inherit;
    background-color: inherit;
    color: inherit;
    border: 1px solid #ffffff;
}

noscript {
    padding: 0.5rem;
}

#debug {
    padding: 0.5rem;
    font-family: 'Courier New', Courier, monospace;
    font-size: 16px;
    white-space: pre-wrap;
}

#rle-wrapper {
    margin-top: auto;
    padding: 0.5rem;
    display: flex;
    flex-direction: column;
    align-items: start;
    gap: 0.5rem;
}

textarea {
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.8rem;
    resize: none;
    background-color: inherit;
    color: inherit;
    border: 1px solid #ffffff;
}

textarea:hover, textarea:focus {
    outline: none;
    border: 1px solid #ffffff;
}

#rle {
    width: 100%;
}

#right {
    position: relative;
    flex: 0 1 80%;
    display: flex;
    flex-direction: column;
}

#right button {
    flex: 0 0 2.5rem;
    width: 2.5rem;
    height: 2.5rem;
    padding: 0.35rem;
    border: 1px solid #ffffff;
    background-color: #000000;
}

#right button.selected {
    background-color: #001fdf;
}

#top {
    height: 3.5rem;
    padding: 0.5rem;
    display: flex;
    flex-direction: row;
    gap: 0.5rem;
    border-bottom: 1px solid #ffffff;
    user-select: none;
}

#top > div:not(.spacer) {
    padding: 0 0.5rem;
    font-size: 1.5rem;
    display: flex;
    flex-direction: row;
    align-items: center;
}

#top .spacer {
    flex: 0 0 1.5rem;
}

#top > div.less-padding {
    padding: 0 0.25rem;
}

#canvas {
    flex: 1 0 auto;
    border-left: 1px solid #000000;
    image-rendering: pixelated;
}

#select-menu {
    display: none;
    position: absolute;
    bottom: 0;
    left: 0;
    padding: 0.5rem;
    flex-direction: column;
    gap: 0.5rem;
    background-color: transparent;
}

#select-menu > div {
    display: flex;
    flex-direction: row;
    gap: 0.5rem;
}

        </style>
    </head>
    <body autocapitalize="off" autocorrect="off" spellcheck="false" writingsuggestions="false">
        <div id="left">
            <noscript>You must enable JavaScript to use this.</noscript>
            <div id="debug"></div>
            <div id="rle-wrapper">
                <textarea id="rle" rows="6">x = 3, y = 3, rule = B3/S23
bo$2bo$3o!</textarea>
                <button id="view-rle">View</button>
            </div>
        </div>
        <div id="right">
            <div id="top">
                <div id="speed" class="less-padding">1x</div>
                <button id="reset">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
                        <rect x="1" y="0" width="4" height="16" fill="#ffffff" />
                        <polygon points="15,0 5,8 15,16" fill="#ffffff" />
                    </svg>
                </button>
                <button id="step">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
                        <rect x="1" y="0" width="4" height="16" fill="#ffffff" />
                        <polygon points="8,0 16,8 8,16" fill="#ffffff" />
                    </svg>
                </button>
                <button id="run">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
                        <polygon points="1,0 15,8 1,16" fill="#ffffff" />
                    </svg>
                </button>
                <button id="pause" style="display: none;">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
                        <rect x="1" y="0" width="4" height="16" fill="#ffffff" />
                        <rect x="11" y="0" width="4" height="16" fill="#ffffff" />
                    </svg>
                </button>
                <div class="spacer"></div>
                <button id="cursor-main" class="selected">
                    <svg viewBox="0 0 16 16">
                        <polygon points="3,0 3,14 6,11 8,15 10,14 8,11 13,11" fill="none" stroke="#ffffff" stroke-width="1" stroke-linejoin="round" />
                    </svg>
                </button>
                <button id="cursor-edit">
                    <svg viewBox="0 0 16 16">
                        <line x1="0" y1="16" x2="4" y2="8" stroke="#ffffff" />
                        <line x1="0" y1="16" x2="8" y2="12" stroke="#ffffff" />
                        <line x1="2" y1="12" x2="4" y2="14" stroke="#ffffff" />
                        <line x1="4" y1="8" x2="8" y2="12" stroke="#ffffff" />
                        <line x1="4" y1="8" x2="12" y2="0" stroke="#ffffff" />
                        <line x1="8" y1="12" x2="16" y2="4" stroke="#ffffff" />
                        <line x1="6" y1="10" x2="12" y2="4" stroke="#ffffff" />
                        <line x1="10" y1="2" x2="14" y2="6" stroke="#ffffff" />
                        <line x1="12" y1="0" x2="16" y2="4" stroke="#ffffff" />
                    </svg>
                </button>
                <button id="cursor-select">
                    <svg viewBox="0 0 16 16" image-rendering="crispEdges">
                        <line x1="0" y1="0" x2="2" y2="0" stroke="#ffffff" stroke-width="2" />
                        <line x1="4" y1="0" x2="7" y2="0" stroke="#ffffff" stroke-width="2" />
                        <line x1="9" y1="0" x2="12" y2="0" stroke="#ffffff" stroke-width="2" />
                        <line x1="14" y1="0" x2="16" y2="0" stroke="#ffffff" stroke-width="2" />
                        <line x1="0" y1="0" x2="0" y2="2" stroke="#ffffff" stroke-width="2" />
                        <line x1="0" y1="4" x2="0" y2="7" stroke="#ffffff" stroke-width="2" />
                        <line x1="0" y1="9" x2="0" y2="12" stroke="#ffffff" stroke-width="2" />
                        <line x1="0" y1="14" x2="0" y2="16" stroke="#ffffff" stroke-width="2" />
                        <line x1="0" y1="16" x2="2" y2="16" stroke="#ffffff" stroke-width="3" />
                        <line x1="4" y1="16" x2="7" y2="16" stroke="#ffffff" stroke-width="3" />
                        <line x1="9" y1="16" x2="12" y2="16" stroke="#ffffff" stroke-width="3" />
                        <line x1="14" y1="16" x2="16" y2="16" stroke="#ffffff" stroke-width="3" />
                        <line x1="16" y1="0" x2="16" y2="2" stroke="#ffffff" stroke-width="2" />
                        <line x1="16" y1="4" x2="16" y2="7" stroke="#ffffff" stroke-width="2" />
                        <line x1="16" y1="9" x2="16" y2="12" stroke="#ffffff" stroke-width="2" />
                        <line x1="16" y1="14" x2="16" y2="16" stroke="#ffffff" stroke-width="2" />
                    </svg>
                </button>
                <div class="spacer"></div>
                <button id="undo">
                    <svg viewBox="0 0 16 16">
                        <path d="M 8 15 A 7 7 0 1 0 2 6" fill="transparent" stroke="#ffffff" />
                        <polygon points="0,2 5,7 0,7" fill="#ffffff" stroke="#ffffff" />
                    </svg>
                </button>
                <button id="redo">
                    <svg viewBox="0 0 16 16">
                        <path d="M 8 15 A 7 7 0 1 1 14 6" fill="transparent" stroke="#ffffff" />
                        <polygon points="16,2 11,7 16,7" fill="#ffffff" stroke="#ffffff" />
                    </svg>
                </button>
                <div class="spacer"></div>
                <div>Z =&nbsp;<span id="zoom">10.0</span></div>
                <div>T =&nbsp;<span id="gens">0</span></div>
                <div>C =&nbsp;<span id="pop">0</span></div>
                <div id="position"><span id="x">0</span>,&nbsp;<span id="y">0</span>&nbsp;=&nbsp;<span id="state">0</span></div>
            </div>
            <canvas id="canvas"></canvas>
            <div id="select-menu">
                <div>
                    <button id="sel-cancel">
                        <svg viewBox="0 0 16 16">
                            <line x1="0" y1="0" x2="16" y2="16" stroke="#ffffff" stroke-width="2" />
                            <line x1="16" y1="0" x2="0" y2="16" stroke="#ffffff" stroke-width="2" />
                        </svg>
                    </button>
                </div>
                <div>
                    <button id="sel-flip-horizontal">
                        <svg viewBox="0 0 16 16">
                            <polygon points="4,0 0,4 4,8" fill="#ffffff" />
                            <line x1="4" y1="4" x2="16" y2="4" stroke="#ffffff" stroke-width="2" />
                            <polygon points="12,8 16,12 12,16" fill="#ffffff" />
                            <line x1="0" y1="12" x2="12" y2="12" stroke="#ffffff" stroke-width="2" />
                        </svg>
                    </button>
                    <button id="sel-flip-vertical">
                        <svg viewBox="0 0 16 16">
                            <polygon points="0,4 4,0 8,4" fill="#ffffff" />
                            <line x1="4" y1="4" x2="4" y2="16" stroke="#ffffff" stroke-width="2" />
                            <polygon points="8,12 12,16 16,12" fill="#ffffff" />
                            <line x1="12" y1="0" x2="12" y2="12" stroke="#ffffff" stroke-width="2" />
                        </svg>
                    </button>
                    <button id="sel-rotate-left">
                        <svg viewBox="0 0 16 16">
                            <polyline points="8,14 13,14 13,2 3,2 3,8" stroke="#ffffff" stroke-width="2" />
                            <polygon points="6,8 0,8 3,12" fill="#ffffff" />
                        </svg>
                    </button>
                    <button id="sel-rotate-right">
                        <svg viewBox="0 0 16 16">
                            <polyline points="8,14 3,14 3,2 13,2 13,8" stroke="#ffffff" stroke-width="2" />
                            <polygon points="10,8 16,8 13,12" fill="#ffffff" />
                        </svg>
                    </button>
                    <button id="sel-rotate-180">
                        <svg viewBox="0 0 16 16">
                            <path d="M 1 6 A 7 7 0 0 1 14 5" fill="transparent" stroke="#ffffff" />
                            <polygon points="16,1 11,6 16,6" fill="#ffffff" stroke="#ffffff" />
                            <path d="M 15 10 A 7 7 0 0 1 2 11" fill="transparent" stroke="#ffffff" />
                            <polygon points="0,15 5,10 0,10" fill="#ffffff" stroke="#ffffff" />
                        </svg>
                    </button>
                    <button id="sel-flip-diagonal">
                        <svg viewBox="0 0 16 16">
                            <line x1="1" y1="10" x2="10" y2="1" stroke="#ffffff" stroke-width="2" />
                            <polygon points="5,0 11,0 11,6" fill="#ffffff" />
                            <line x1="15" y1="6" x2="7" y2="13" stroke="#ffffff" stroke-width="2" />
                            <polygon points="11,15 5,15 5,9" fill="#ffffff" />
                        </svg>
                    </button>
                        <button id="sel-flip-anti-diagonal">
                        <svg viewBox="0 0 16 16">
                            <line x1="15" y1="10" x2="6" y2="1" stroke="#ffffff" stroke-width="2" />
                            <polygon points="11,0 5,0 5,6" fill="#ffffff" />
                            <line x1="1" y1="6" x2="9" y2="13" stroke="#ffffff" stroke-width="2" />
                            <polygon points="5,15 11,15 11,9" fill="#ffffff" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        <script>'use strict';(()=>{function printError(e){let x=String(e instanceof Error?('stack' in e?e.stack:e):e).replaceAll(/file:\/\/\/media\/fuse\/drivefs-[0-9a-f]+\/root\/code\//g,'');for(let m of x.matchAll(/data:text\/javascript;base64,([a-zA-Z0-9+/=]+)/g)){let f=atob(m[1]);x=x.replaceAll(m[0],f.slice(2,f.indexOf('*/')))+(x.toLowerCase().includes('failed to fetch')?'\\n\\n'+f:'');}if(document.readyState!=='complete'){alert(x);return;}document.body.replaceChildren([]);let t=document.createElement('pre');t.style.color='red';t.style.paddingLeft='15px';t.style.paddingBottom='15px';t.style.fontFamily="'Courier New',Courier,monospace";t.style.fontSize='14px';t.textContent=x;document.body.appendChild(t);document.body.style.overflowY='auto';let l=setInterval(()=>{});for(let i=1;i<=l;i++)clearInterval(i);l=requestAnimationFrame(()=>{});for(let i=1;i<=l;i++)cancelAnimationFrame(i);onkeydown=()=>{};onkeyup=()=>{};onclick=()=>{};onmousedown=()=>{};onmouseup=()=>{};if(typeof running==='boolean')running=false;};window.addEventListener('error',e=>{printError(e.error);return true;});window.addEventListener('unhandledrejection',e=>{e.preventDefault();printError(e.reason);});})()</script>
        <script src="index.js"></script>
    </body>
</html>
