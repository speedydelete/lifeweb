<!DOCTYPE html>
<html>
    <head>
        <title>VLS</title>
        <meta charset="utf-8">
        <style>

* {
    box-sizing: border-box;
}

button, input:not([type=checkbox]) {
    padding: 3px 6px;
    font-family: inherit;
    font-size: inherit;
    background-color: inherit;
    color: inherit;
    border: 1px solid black;
}

input:focus {
    outline: none;
}

html, body {
    position: absolute;
    inset: 0;
    height: 100%;
    width: 100%;
    overflow-y: unset;
    overflow-x: unset;
}

html {
    padding: 0;
    margin: 0;
}

html, body {
    height: 100%;
}

body {
    padding: 20px;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

#command {
    flex: 0 0 auto;
    padding: 5px;
    font-family: 'Courier New', Courier, monospace;
    font-size: inherit;
    resize: none;
}

#command:focus {
    outline: none;
}

#buttons {
    display: flex;
    flex-direction: row;
    gap: 20px;
}

#out {
    max-height: calc(100% - 2px - 10px - 2rem - 20px - 6px - 1rem - 2px);
    white-space: pre-wrap;
    font-family: 'Courier New', Courier, monospace;
    font-size: 16px;
    overflow-y: scroll;
}

        </style>
    </head>
    <body autocapitalize="off" autocorrect="off" spellcheck="false" writingsuggestions="false">
        <textarea rows="2" id="command"></textarea>
        <div id="buttons">
            <button id="compile">Compile</button>
        </div>
        <div id="out"></div>
        <script type="module">

import {transformCode} from './index.js';
import source from './index.c';


let commandInput = document.getElementById('command');

if (localStorage.lifewebVLSCommand) {
    commandInput.value = localStorage.lifewebVLSCommand;
}
commandInput.addEventListener('input', () => {
    localStorage.lifewebVLSCommand = commandInput.value;
});


globalThis.process = {
    exit(code = 0) {}
};

let outElt = document.getElementById('out');

document.getElementById('compile').addEventListener('click', async () => {
    let argv = ['node'].concat(commandInput.value.split(' '));
    outElt.textContent = (await transformCode(argv, source))[1];
    let range = document.createRange();
    range.selectNodeContents(outElt);
    let sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
});

        </script>
    </body>
</html>
